<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<title>نظام رصد الملاحظات الميدانية</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#EEF2F7;min-height:100vh;direction:rtl}
.header{background:linear-gradient(135deg,#0B2545,#1B4F8A);color:#fff;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header-inner{display:flex;align-items:center;gap:12px;max-width:680px;margin:0 auto}
.header h1{font-size:17px;font-weight:800}
.header p{font-size:11px;opacity:.65;margin-top:2px}
.badge{background:#F97316;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;margin-right:auto}
.tabs{background:#fff;border-bottom:2px solid #E2E8F0}
.tabs-inner{max-width:680px;margin:0 auto;display:flex}
.tab{padding:13px 18px;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;background:transparent;color:#64748B;border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab.active{background:#EFF6FF;color:#1B4F8A;border-bottom-color:#1B4F8A}
.tab.locked{color:#94A3B8}
.main{max-width:680px;margin:0 auto;padding:18px 12px 50px}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid #EEF0F4;overflow:hidden;margin-bottom:14px}
.card-title{padding:13px 16px;font-weight:700;font-size:14px;color:#0B2545;border-bottom:1.5px solid #F1F5F9;background:#FAFBFD;display:flex;align-items:center;gap:7px}
.card-body{padding:16px;display:flex;flex-direction:column;gap:12px}
label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border-radius:10px;font-size:13px;border:1.5px solid #CBD5E1;background:#F8FAFC;outline:none;color:#1E293B;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#1B4F8A;background:#fff}
textarea{resize:vertical}
.err{color:#EF4444;font-size:11px;margin-top:4px}
.gps-row{display:flex;gap:10px;align-items:center}
.gps-display{flex:1;background:#F8FAFC;border:1.5px solid #CBD5E1;border-radius:10px;padding:11px 14px;font-size:13px;color:#94A3B8}
.gps-display.set{color:#0B2545}
.btn-gps{background:#1B4F8A;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;font-family:inherit}
.photo-zone{width:100%;border:2px dashed #CBD5E1;border-radius:12px;padding:18px;background:#F8FAFC;cursor:pointer;color:#64748B;font-size:13px;text-align:center;font-family:inherit}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.photo-wrap{position:relative}
.photo-wrap img{width:80px;height:80px;object-fit:cover;border-radius:10px;border:2px solid #E2E8F0;display:block}
.photo-del{position:absolute;top:-6px;left:-6px;background:#EF4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.sev-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sev-btn{border:2px solid #E2E8F0;background:#fff;border-radius:11px;padding:11px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#64748B;font-size:13px;transition:all .15s;font-family:inherit;width:100%}
.sev-btn.active-low{border-color:#3B82F6;background:#EFF6FF;color:#3B82F6;font-weight:700}
.sev-btn.active-medium{border-color:#EAB308;background:#FEFCE8;color:#EAB308;font-weight:700}
.sev-btn.active-high{border-color:#F97316;background:#FFF7ED;color:#F97316;font-weight:700}
.sev-btn.active-critical{border-color:#EF4444;background:#FEF2F2;color:#EF4444;font-weight:700}
.sev-icon{font-size:22px}
.rcp-wrap{border-radius:12px;overflow:hidden;border:2px solid #E2E8F0;transition:border .15s;margin-bottom:10px}
.rcp-wrap.selected{border-color:#1B4F8A}
.rcp-btn{width:100%;background:#fff;border:none;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;color:#475569;font-size:14px;font-weight:500;font-family:inherit}
.rcp-wrap.selected .rcp-btn{background:#EFF6FF;color:#1B4F8A;font-weight:700}
.rcp-icon{font-size:24px}
.rcp-check{margin-right:auto;font-size:20px}
.rcp-email-box{background:#F0F7FF;padding:12px 14px;border-top:1.5px solid #BFDBFE}
.rcp-email-box label{color:#1D4ED8;margin-bottom:6px}
.extra-box{border:2px solid #E2E8F0;border-radius:12px;overflow:hidden}
.extra-header{padding:11px 16px;font-weight:600;color:#64748B;font-size:13px;background:#F8FAFC;border-bottom:1px solid #F1F5F9}
.extra-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.preview-box{background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:12px;padding:12px 16px;margin-top:4px}
.preview-title{font-weight:700;color:#166534;font-size:12px;margin-bottom:8px}
.preview-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px;color:#15803D}
.preview-email{direction:ltr}
.btn-submit{width:100%;background:linear-gradient(135deg,#0B2545,#1B4F8A);color:#fff;border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(27,79,138,.4);transition:all .2s;font-family:inherit;margin-top:4px}
.btn-submit:disabled{background:#94A3B8;box-shadow:none;cursor:not-allowed}
.result-box{border-radius:16px;padding:18px;margin-bottom:14px}
.result-box.ok{background:#F0FDF4;border:2px solid #86EFAC}
.result-box.fail{background:#FEF2F2;border:2px solid #FECACA}
.result-title{font-weight:800;font-size:16px;margin-bottom:12px}
.result-box.ok .result-title{color:#166534}
.result-box.fail .result-title{color:#991B1B}
.result-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;background:#fff;border-radius:10px;padding:10px 14px}
.result-item.ok{border:1px solid #BBF7D0}
.result-item.fail{border:1px solid #FECACA}
.result-label{font-weight:700;font-size:13px}
.result-email{color:#64748B;font-size:12px;direction:ltr;flex:1}
.result-status{font-size:12px;font-weight:600}
.result-item.ok .result-status{color:#16A34A}
.result-item.fail .result-status{color:#EF4444}
.btn-new{margin-top:10px;background:#1B4F8A;color:#fff;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit}
.no-rcp{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;color:#B91C1C;font-size:13px;font-weight:600;margin-bottom:8px}
.rec-card{background:#fff;border-radius:14px;padding:14px 16px;cursor:pointer;border:1.5px solid #E2E8F0;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:10px}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rec-site{font-weight:700;font-size:14px;color:#0B2545}
.sev-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
.rec-type{color:#64748B;font-size:12px;margin-top:4px}
.rec-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:11px;color:#94A3B8}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.06);border:2px solid #E2E8F0}
.stat-icon{font-size:30px}
.stat-num{font-size:36px;font-weight:900;line-height:1.1}
.stat-label{font-size:12px;color:#64748B;margin-top:3px}
.total-num{font-size:52px;font-weight:900;color:#0B2545;line-height:1}
.type-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F1F5F9}
.type-name{flex:1;font-size:13px;color:#334155}
.type-count{background:#EFF6FF;color:#1B4F8A;border-radius:20px;padding:2px 12px;font-size:12px;font-weight:700}
.empty{text-align:center;padding:70px 20px}
.empty-icon{font-size:52px}
.empty-msg{font-weight:700;color:#334155;margin-top:14px;font-size:16px}
.empty-sub{color:#94A3B8;font-size:13px;margin-top:6px}
.back-btn{background:none;border:none;cursor:pointer;color:#1B4F8A;font-weight:700;font-size:14px;margin-bottom:14px;padding:0;font-family:inherit}
.detail-header{border-radius:16px;padding:16px 18px;margin-bottom:12px}
.detail-site{font-weight:800;font-size:16px;color:#0B2545}
.detail-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.detail-meta{font-size:12px;color:#64748B;margin-top:5px}
.detail-row{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1.5px solid #F1F5F9}
.detail-row-label{font-size:11px;color:#94A3B8;margin-bottom:3px}
.detail-row-val{font-size:14px;color:#1E293B;font-weight:500}
.email-log{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1.5px solid #F1F5F9}
.email-log-title{font-size:11px;color:#94A3B8;margin-bottom:10px}
.email-log-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;padding:8px 12px;border-radius:8px}
.email-log-row.ok{background:#F0FDF4}
.email-log-row.fail{background:#FEF2F2}
.photo-log{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1.5px solid #F1F5F9}
.photo-log-title{font-size:11px;color:#94A3B8;margin-bottom:10px}
.photo-log-grid{display:flex;flex-wrap:wrap;gap:8px}
.photo-log-grid img{width:90px;height:90px;object-fit:cover;border-radius:10px;border:2px solid #E2E8F0}
.btn-del{width:100%;margin-top:8px;background:#FEF2F2;color:#EF4444;border:1.5px solid #FECACA;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit}

/* ── PIN Modal ── */
.pin-overlay{position:fixed;inset:0;background:rgba(11,37,69,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.pin-box{background:#fff;border-radius:24px;padding:32px 28px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.pin-icon{font-size:48px;margin-bottom:12px}
.pin-title{font-size:18px;font-weight:800;color:#0B2545;margin-bottom:4px}
.pin-sub{font-size:13px;color:#64748B;margin-bottom:24px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#E2E8F0;transition:background .2s}
.pin-dot.filled{background:#1B4F8A}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:14px;padding:16px;font-size:20px;font-weight:700;cursor:pointer;color:#1E293B;font-family:inherit;transition:all .1s}
.pin-key:active{background:#EFF6FF;border-color:#1B4F8A;transform:scale(.95)}
.pin-key.zero{grid-column:2}
.pin-key.del{background:#FEF2F2;border-color:#FECACA;color:#EF4444;font-size:16px}
.pin-error{color:#EF4444;font-size:13px;font-weight:600;margin-top:12px;min-height:20px}
.pin-shake{animation:shake .4s}
.lock-icon{font-size:14px;opacity:.6}
.change-pin-btn{background:none;border:none;color:#94A3B8;font-size:12px;cursor:pointer;margin-top:14px;font-family:inherit;text-decoration:underline}

/* change pin modal */
.pin-change-box{background:#fff;border-radius:24px;padding:28px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.pin-change-input{width:100%;padding:13px;border-radius:10px;border:1.5px solid #CBD5E1;font-size:18px;text-align:center;letter-spacing:8px;font-family:inherit;margin:10px 0}
.pin-change-input:focus{outline:none;border-color:#1B4F8A}
.pin-change-btns{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;background:#F1F5F9;color:#64748B;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save-pin{flex:1;background:#1B4F8A;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <span style="font-size:30px">🦺</span>
    <div>
      <h1>نظام رصد الملاحظات الميدانية</h1>
      <p>HSE Field Observation System</p>
    </div>
    <span class="badge" id="rec-badge" style="display:none">0 ملاحظة</span>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" onclick="switchTab('new')">➕ ملاحظة جديدة</button>
    <button class="tab locked" onclick="requirePin('records')">📋 السجل 🔒</button>
    <button class="tab locked" onclick="requirePin('stats')">📊 إحصائيات 🔒</button>
  </div>
</div>

<div class="main">
  <div id="tab-new"></div>
  <div id="tab-records" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
</div>

<input type="file" id="photo-input" accept="image/*" multiple style="display:none">

<!-- PIN Modal -->
<div class="pin-overlay" id="pin-overlay" style="display:none">
  <div class="pin-box" id="pin-box">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">منطقة محمية</div>
    <div class="pin-sub">أدخل الرقم السري للدخول</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key zero" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="change-pin-btn" onclick="showChangePin()">تغيير الرقم السري</button>
  </div>

  <!-- Change PIN sub-box -->
  <div class="pin-change-box" id="pin-change-box" style="display:none">
    <div class="pin-icon">🔑</div>
    <div class="pin-title">تغيير الرقم السري</div>
    <div class="pin-sub">أدخل الرقم السري الحالي ثم الجديد</div>
    <label style="text-align:right;display:block;margin-top:10px">الرقم الحالي</label>
    <input type="password" id="old-pin" class="pin-change-input" maxlength="4" inputmode="numeric" placeholder="••••">
    <label style="text-align:right;display:block;margin-top:6px">الرقم الجديد</label>
    <input type="password" id="new-pin" class="pin-change-input" maxlength="4" inputmode="numeric" placeholder="••••">
    <label style="text-align:right;display:block;margin-top:6px">تأكيد الرقم الجديد</label>
    <input type="password" id="confirm-pin" class="pin-change-input" maxlength="4" inputmode="numeric" placeholder="••••">
    <div class="pin-error" id="change-pin-error"></div>
    <div class="pin-change-btns">
      <button class="btn-cancel" onclick="hideChangePin()">إلغاء</button>
      <button class="btn-save-pin" onclick="saveNewPin()">💾 حفظ</button>
    </div>
  </div>
</div>

<script>
const SVC  = "service_tle1asp";
const TPL  = "template_x1mnw59";
const PKEY = "kUBNIWqdmXBsoxdSd";

const SEV = {
  low:      {label:"منخفضة",   color:"#3B82F6",bg:"#EFF6FF",icon:"🟦"},
  medium:   {label:"متوسطة",   color:"#EAB308",bg:"#FEFCE8",icon:"🟨"},
  high:     {label:"عالية",    color:"#F97316",bg:"#FFF7ED",icon:"🟧"},
  critical: {label:"خطر فوري",color:"#EF4444",bg:"#FEF2F2",icon:"🔴"},
};
const OBS_TYPES = [
  "طفاية حريق منتهية الصلاحية","مخرج طوارئ مغلق / معطل",
  "كابلات كهربائية مكشوفة","تسرب سوائل / مواد","سقالة غير آمنة",
  "غياب معدات الحماية الشخصية","إضاءة غير كافية","انسداد ممرات الإخلاء","ملاحظة أخرى",
];
const VISIT_TYPES = ["زيارة دورية","زيارة مفاجئة","متابعة ملاحظة سابقة","زيارة تفتيشية","زيارة استلام"];
const RCPS = [
  {id:"supervisor",label:"المشرف",       icon:"👷"},
  {id:"engineer",  label:"المهندس",      icon:"🔧"},
  {id:"manager",   label:"المدير",        icon:"👔"},
  {id:"safety",    label:"مسؤول السلامة",icon:"🦺"},
];

let records = JSON.parse(localStorage.getItem("hse_recs")||"[]");
let photos=[], selSev="", rcps=Object.fromEntries(RCPS.map(r=>[r.id,{sel:false,email:""}]));
let viewRec=null, curTab="new";

// ── PIN State ────────────────────────────────────────────────────
let pinEntry = "";
let pendingTab = "";
let unlocked = false;
let unlockTimer = null;
const DEFAULT_PIN = "1234";

function getPin(){ return localStorage.getItem("hse_pin") || DEFAULT_PIN; }

function requirePin(tab){
  if(unlocked){ switchTab(tab); return; }
  pendingTab = tab;
  pinEntry = "";
  updatePinDots();
  g("pin-error").textContent = "";
  g("pin-overlay").style.display = "flex";
  g("pin-box").style.display = "block";
  g("pin-change-box").style.display = "none";
}

function pinKey(k){
  if(pinEntry.length >= 4) return;
  pinEntry += k;
  updatePinDots();
  if(pinEntry.length === 4) setTimeout(checkPin, 120);
}

function pinDel(){
  pinEntry = pinEntry.slice(0,-1);
  updatePinDots();
  g("pin-error").textContent = "";
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    g("d"+i).classList.toggle("filled", i < pinEntry.length);
  }
}

function checkPin(){
  if(pinEntry === getPin()){
    unlocked = true;
    g("pin-overlay").style.display = "none";
    switchTab(pendingTab);
    // Auto-lock after 10 minutes
    clearTimeout(unlockTimer);
    unlockTimer = setTimeout(()=>{ unlocked=false; }, 10*60*1000);
  } else {
    g("pin-box").classList.add("pin-shake");
    g("pin-error").textContent = "❌ رقم سري خاطئ، حاول مرة أخرى";
    pinEntry = "";
    updatePinDots();
    setTimeout(()=>g("pin-box").classList.remove("pin-shake"), 400);
  }
}

function showChangePin(){
  g("pin-box").style.display = "none";
  g("pin-change-box").style.display = "block";
  g("old-pin").value=""; g("new-pin").value=""; g("confirm-pin").value="";
  g("change-pin-error").textContent="";
}

function hideChangePin(){
  g("pin-change-box").style.display = "none";
  g("pin-box").style.display = "block";
  pinEntry=""; updatePinDots(); g("pin-error").textContent="";
}

function saveNewPin(){
  const old = g("old-pin").value.trim();
  const nw  = g("new-pin").value.trim();
  const cf  = g("confirm-pin").value.trim();
  const err = g("change-pin-error");
  if(old !== getPin()){ err.textContent="❌ الرقم الحالي غير صحيح"; return; }
  if(nw.length < 4){ err.textContent="❌ الرقم الجديد يجب أن يكون 4 أرقام"; return; }
  if(!/^\d{4}$/.test(nw)){ err.textContent="❌ أدخل أرقام فقط"; return; }
  if(nw !== cf){ err.textContent="❌ الرقم الجديد غير متطابق"; return; }
  localStorage.setItem("hse_pin", nw);
  err.style.color="#16A34A"; err.textContent="✅ تم تغيير الرقم السري بنجاح!";
  setTimeout(()=>{ g("pin-overlay").style.display="none"; unlocked=true; switchTab(pendingTab); }, 1000);
}

emailjs.init({publicKey: PKEY});
function g(id){return document.getElementById(id)}
function val(id){const el=g(id);return el?el.value.trim():"";}
function saveRecs(){localStorage.setItem("hse_recs",JSON.stringify(records));}
function fmtDate(iso){return new Date(iso).toLocaleString("ar-SA",{dateStyle:"short",timeStyle:"short"});}

function buildMsg(data,toLabel){
  const sev=SEV[data.sev]?.label||"";
  return "📋 ملاحظة ميدانية جديدة
"+
    "─────────────────────────
"+
    "📍 الموقع      : "+data.site+"
"+
    "🗂 نوع الزيارة : "+data.vtype+"
"+
    "👷 المفتش      : "+data.insp+"
"+
    "📌 الإحداثيات  : "+(data.gps||"غير محدد")+"
"+
    (data.locDesc?"📝 وصف الموقع  : "+data.locDesc+"
":"")+
    "
─────────────────────────
"+
    "📋 تفاصيل الملاحظة
"+
    "─────────────────────────
"+
    "النوع          : "+data.otype+"
"+
    "الوصف          : "+data.odesc+"
"+
    "درجة الخطورة   : "+sev+"
"+
    (data.action?"الإجراء        : "+data.action+"
":"")+
    "
─────────────────────────
"+
    "📅 التاريخ     : "+new Date().toLocaleString("ar-SA")+"
"+
    "👤 المُرسَل إلى : "+toLabel+"
"+
    "─────────────────────────
"+
    "نظام رصد الملاحظات الميدانية";
}

function switchTab(t){
  curTab=t;
  ["new","records","stats"].forEach(k=>{ g("tab-"+k).style.display=k===t?"block":"none"; });
  document.querySelectorAll(".tab").forEach((el,i)=>{
    el.classList.toggle("active",["new","records","stats"][i]===t);
  });
  if(t==="new")     renderNew();
  if(t==="records") renderRecords();
  if(t==="stats")   renderStats();
}

function renderNew(){
  const el=g("tab-new");
  el.innerHTML=`
  <div class="card">
    <div class="card-title">🏢 بيانات الزيارة</div>
    <div class="card-body">
      <div><label>اسم الموقع / المنشأة</label><input id="f-site" placeholder="مثال: مصنع الطاقة — الوحدة 3"><div id="e-site" class="err" style="display:none"></div></div>
      <div><label>نوع الزيارة</label><select id="f-vtype"><option value="">— اختر النوع —</option>${VISIT_TYPES.map(v=>`<option>${v}</option>`).join("")}</select><div id="e-vtype" class="err" style="display:none"></div></div>
      <div><label>المفتش / المراقب الميداني</label><input id="f-insp" placeholder="الاسم الكامل"><div id="e-insp" class="err" style="display:none"></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📍 الموقع الجغرافي</div>
    <div class="card-body">
      <div class="gps-row">
        <div class="gps-display" id="gps-display">🛰️ لم يتم التحديد بعد</div>
        <button class="btn-gps" onclick="getGPS()">📡 تحديد</button>
      </div>
      <div><label>وصف الموقع (اختياري)</label><input id="f-locdesc" placeholder="مثال: الطابق الثاني، قرب محطة الضخ"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📷 صور الملاحظة</div>
    <div class="card-body">
      <button class="photo-zone" onclick="g('photo-input').click()">📸 اضغط لالتقاط صورة أو رفع من المعرض</button>
      <div class="photo-grid" id="photo-grid"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📝 تفاصيل الملاحظة</div>
    <div class="card-body">
      <div><label>نوع الملاحظة</label><select id="f-otype"><option value="">— اختر النوع —</option>${OBS_TYPES.map(v=>`<option>${v}</option>`).join("")}</select><div id="e-otype" class="err" style="display:none"></div></div>
      <div><label>وصف الملاحظة التفصيلي</label><textarea id="f-odesc" rows="3" placeholder="اشرح الملاحظة بالتفصيل..."></textarea><div id="e-odesc" class="err" style="display:none"></div></div>
      <div>
        <label>تصنيف درجة الخطورة</label>
        <div class="sev-grid">
          ${Object.entries(SEV).map(([k,s])=>`<button class="sev-btn" id="sev-${k}" onclick="setSev('${k}')"><span class="sev-icon">${s.icon}</span>${s.label}</button>`).join("")}
        </div>
        <div id="e-sev" class="err" style="display:none"></div>
      </div>
      <div><label>الإجراء التصحيحي المقترح</label><textarea id="f-action" rows="2" placeholder="ما الإجراء المطلوب اتخاذه؟"></textarea></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📤 إرسال فوري إلى</div>
    <div class="card-body">
      <div id="e-norcp" class="no-rcp" style="display:none">⚠️ اختر مستلماً واحداً على الأقل</div>
      ${RCPS.map(r=>`
      <div class="rcp-wrap" id="rcp-wrap-${r.id}">
        <button class="rcp-btn" onclick="toggleRcp('${r.id}')">
          <span class="rcp-icon">${r.icon}</span><span>${r.label}</span>
          <span class="rcp-check" id="rcp-check-${r.id}">⬜</span>
        </button>
        <div class="rcp-email-box" id="rcp-email-${r.id}" style="display:none">
          <label>📧 البريد الإلكتروني لـ ${r.label}</label>
          <input type="email" id="em-${r.id}" placeholder="example@company.com" style="direction:ltr;text-align:left" oninput="updatePreview()">
          <div id="e-em-${r.id}" class="err" style="display:none"></div>
        </div>
      </div>`).join("")}
      <div class="extra-box">
        <div class="extra-header">📬 بريد إضافي (اختياري)</div>
        <div class="extra-body">
          <div><label>الاسم</label><input id="f-xname" placeholder="مثال: المدير التنفيذي" oninput="updatePreview()"></div>
          <div><label>الإيميل</label><input type="email" id="f-xemail" placeholder="example@company.com" style="direction:ltr;text-align:left" oninput="updatePreview()"></div>
        </div>
      </div>
      <div id="preview-box" style="display:none" class="preview-box">
        <div class="preview-title">📨 سيُرسل الإيميل إلى:</div>
        <div id="preview-list"></div>
      </div>
    </div>
  </div>
  <button class="btn-submit" id="btn-submit" onclick="submitForm()">📡 رفع الملاحظة وإرسال الإيميلات</button>`;
  photos=[];selSev="";rcps=Object.fromEntries(RCPS.map(r=>[r.id,{sel:false,email:""}]));
  g("photo-input").onchange=handlePhoto;
  updateBadge();
}

function getGPS(){
  const d=g("gps-display");d.textContent="⏳ جارٍ التحديد...";
  navigator.geolocation?.getCurrentPosition(
    ({coords})=>{const t=coords.latitude.toFixed(5)+", "+coords.longitude.toFixed(5);d.textContent=t;d.className="gps-display set";},
    ()=>{d.textContent="تعذّر الحصول على الموقع";},{enableHighAccuracy:true}
  );
}
function handlePhoto(e){
  Array.from(e.target.files).forEach(file=>{
    const r=new FileReader();r.onload=ev=>{photos.push({name:file.name,url:ev.target.result});renderPhotos();};r.readAsDataURL(file);
  });e.target.value="";
}
function renderPhotos(){
  g("photo-grid").innerHTML=photos.map((p,i)=>`<div class="photo-wrap"><img src="${p.url}"><button class="photo-del" onclick="delPhoto(${i})">x</button></div>`).join("");
}
function delPhoto(i){photos.splice(i,1);renderPhotos();}
function setSev(k){
  selSev=k;
  Object.keys(SEV).forEach(s=>{g("sev-"+s).className="sev-btn"+(s===k?" active-"+s:"");});
  g("e-sev").style.display="none";
}
function toggleRcp(id){
  rcps[id].sel=!rcps[id].sel;
  g("rcp-wrap-"+id).classList.toggle("selected",rcps[id].sel);
  g("rcp-check-"+id).textContent=rcps[id].sel?"✅":"⬜";
  g("rcp-email-"+id).style.display=rcps[id].sel?"block":"none";
  updatePreview();
}
function updatePreview(){
  const list=[];
  RCPS.forEach(r=>{if(rcps[r.id].sel){rcps[r.id].email=g("em-"+r.id)?.value.trim()||"";if(rcps[r.id].email)list.push({icon:r.icon,label:r.label,email:rcps[r.id].email});}});
  const xe=g("f-xemail")?.value.trim()||"";
  if(xe)list.push({icon:"📬",label:g("f-xname")?.value.trim()||"إضافي",email:xe});
  const box=g("preview-box");
  if(list.length>0){box.style.display="block";g("preview-list").innerHTML=list.map(l=>`<div class="preview-row"><span>${l.icon}</span><b>${l.label}</b><span class="preview-email">${l.email}</span></div>`).join("");}
  else box.style.display="none";
}
function showErr(id,msg){const el=g(id);if(el){el.textContent="⚠ "+msg;el.style.display="block";}}
function hideErr(id){const el=g(id);if(el)el.style.display="none";}
function validate(){
  let ok=true;
  if(!val("f-site")){showErr("e-site","مطلوب");ok=false;}else hideErr("e-site");
  if(!val("f-vtype")){showErr("e-vtype","مطلوب");ok=false;}else hideErr("e-vtype");
  if(!val("f-insp")){showErr("e-insp","مطلوب");ok=false;}else hideErr("e-insp");
  if(!val("f-otype")){showErr("e-otype","مطلوب");ok=false;}else hideErr("e-otype");
  if(!val("f-odesc")){showErr("e-odesc","مطلوب");ok=false;}else hideErr("e-odesc");
  if(!selSev){showErr("e-sev","اختر درجة الخطورة");ok=false;}else hideErr("e-sev");
  RCPS.forEach(r=>{if(rcps[r.id].sel&&!rcps[r.id].email.trim()){showErr("e-em-"+r.id,"أدخل الإيميل");ok=false;}else hideErr("e-em-"+r.id);});
  const anyRcp=RCPS.some(r=>rcps[r.id].sel)||(g("f-xemail")?.value.trim()||"");
  if(!anyRcp){g("e-norcp").style.display="block";ok=false;}else g("e-norcp").style.display="none";
  return ok;
}
async function submitForm(){
  if(!validate())return;
  const btn=g("btn-submit");btn.disabled=true;btn.textContent="⏳ جارٍ الإرسال...";
  const data={site:val("f-site"),vtype:val("f-vtype"),insp:val("f-insp"),
    gps:g("gps-display").textContent.includes(",")?g("gps-display").textContent:"",
    locDesc:val("f-locdesc"),otype:val("f-otype"),odesc:val("f-odesc"),sev:selSev,action:val("f-action")};
  const targets=[];
  RCPS.forEach(r=>{if(rcps[r.id].sel&&rcps[r.id].email.trim())targets.push({label:r.label,icon:r.icon,email:rcps[r.id].email.trim()});});
  const xe=val("f-xemail");if(xe)targets.push({label:val("f-xname")||"إضافي",icon:"📬",email:xe});
  const sev=SEV[selSev]?.label||"";const results=[];
  for(const t of targets){
    try{await emailjs.send(SVC,TPL,{to_email:t.email,to_name:t.label,subject:"ملاحظة ميدانية ["+sev+"] — "+data.site,message:buildMsg(data,t.label)});results.push({...t,ok:true});}
    catch(e){results.push({...t,ok:false,err:String(e.text||e.message||e)});}
  }
  const rec={...data,id:Date.now(),createdAt:new Date().toISOString(),photos:[...photos],emailResults:results};
  records.unshift(rec);saveRecs();updateBadge();
  const anyOk=results.some(r=>r.ok);
  g("tab-new").innerHTML=`<div class="result-box ${anyOk?"ok":"fail"}">
    <div class="result-title">${anyOk?"✅ تم الإرسال بنجاح!":"❌ فشل الإرسال"}</div>
    ${results.map(r=>`<div class="result-item ${r.ok?"ok":"fail"}"><span style="font-size:20px">${r.ok?"✅":"❌"}</span><span class="result-label">${r.icon} ${r.label}</span><span class="result-email">${r.email}</span><span class="result-status">${r.ok?"أُرسل ✓":r.err||"فشل"}</span></div>`).join("")}
    <button class="btn-new" onclick="renderNew();switchTab('new')">➕ ملاحظة جديدة</button></div>`;
}
function updateBadge(){const b=g("rec-badge");if(records.length>0){b.textContent=records.length+" ملاحظة";b.style.display="inline";}else b.style.display="none";}

function renderRecords(){
  const el=g("tab-records");
  if(viewRec){renderDetail(el);return;}
  if(records.length===0){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">لا توجد ملاحظات بعد</div><div class="empty-sub">أضف أول ملاحظة من تبويب ➕ جديدة</div></div>`;return;}
  el.innerHTML=records.map((rec,i)=>{
    const sev=SEV[rec.sev]||{};const sent=rec.emailResults?`📧 ${rec.emailResults.filter(r=>r.ok).length}/${rec.emailResults.length} أُرسل`:"";
    return `<div class="rec-card" onclick="openRec(${i})"><div class="rec-top"><span class="rec-site">${rec.site}</span><span class="sev-badge" style="background:${sev.color}22;color:${sev.color};border:1px solid ${sev.color}55">${sev.label||"—"}</span></div><div class="rec-type">${rec.otype}</div><div class="rec-meta"><span>👷 ${rec.insp}</span><span>🕐 ${fmtDate(rec.createdAt)}</span><span style="color:${rec.emailResults?.every(r=>r.ok)?"#16A34A":"#EF4444"}">${sent}</span></div></div>`;
  }).join("");
}
function openRec(i){viewRec=records[i];renderRecords();}
function renderDetail(el){
  const rec=viewRec;const sev=SEV[rec.sev]||{};
  el.innerHTML=`<button class="back-btn" onclick="viewRec=null;renderRecords()">← رجوع للسجل</button>
  <div class="detail-header" style="background:linear-gradient(135deg,${sev.color}18,${sev.color}06);border:2px solid ${sev.color}40">
    <div class="detail-top"><span class="detail-site">${rec.site}</span><span class="sev-badge" style="background:${sev.color};color:#fff;padding:4px 14px">${sev.icon} ${sev.label}</span></div>
    <div class="detail-meta">${rec.vtype} · ${fmtDate(rec.createdAt)}</div>
  </div>
  ${[["👷 المفتش",rec.insp],["📋 نوع الملاحظة",rec.otype],["📝 التفاصيل",rec.odesc],["🔧 الإجراء المقترح",rec.action||"—"],["📍 الموقع",rec.gps||rec.locDesc||"—"]].map(([l,v])=>`<div class="detail-row"><div class="detail-row-label">${l}</div><div class="detail-row-val">${v}</div></div>`).join("")}
  ${rec.emailResults?.length?`<div class="email-log"><div class="email-log-title">📧 سجل إرسال الإيميلات</div>${rec.emailResults.map(r=>`<div class="email-log-row ${r.ok?"ok":"fail"}"><span>${r.ok?"✅":"❌"}</span><span style="font-weight:600">${r.icon} ${r.label}</span><span style="color:#64748B;direction:ltr;flex:1;font-size:12px">${r.email}</span><span style="font-size:12px;font-weight:600;color:${r.ok?"#16A34A":"#EF4444"}">${r.ok?"أُرسل":"فشل"}</span></div>`).join("")}</div>`:""}
  ${rec.photos?.length?`<div class="photo-log"><div class="photo-log-title">📷 الصور</div><div class="photo-log-grid">${rec.photos.map(p=>`<img src="${p.url}">`).join("")}</div></div>`:""}
  <button class="btn-del" onclick="delRec()">🗑 حذف هذه الملاحظة</button>`;
}
function delRec(){records=records.filter(r=>r.id!==viewRec.id);saveRecs();updateBadge();viewRec=null;renderRecords();}

function renderStats(){
  const el=g("tab-stats");
  const bySev=k=>records.filter(r=>r.sev===k).length;
  const byType=OBS_TYPES.map(t=>[t,records.filter(r=>r.otype===t).length]).filter(([,n])=>n>0).sort(([,a],[,b])=>b-a);
  el.innerHTML=`<div class="stat-grid">
    ${[{k:"critical",l:"خطر فوري",i:"🔴"},{k:"high",l:"عالية",i:"🟧"},{k:"medium",l:"متوسطة",i:"🟨"},{k:"low",l:"منخفضة",i:"🟦"}].map(s=>`<div class="stat-card" style="border-color:${SEV[s.k].color}30"><div class="stat-icon">${s.i}</div><div class="stat-num" style="color:${SEV[s.k].color}">${bySev(s.k)}</div><div class="stat-label">${s.l}</div></div>`).join("")}
  </div>
  <div class="card"><div class="card-title">📊 المجموع الكلي</div><div class="card-body" style="align-items:center;padding:20px"><div class="total-num">${records.length}</div><div style="color:#64748B;margin-top:6px">إجمالي الملاحظات المسجّلة</div></div></div>
  <div class="card"><div class="card-title">📋 الأنواع الأكثر رصداً</div><div class="card-body">
  ${byType.length?byType.map(([t,n])=>`<div class="type-row"><span class="type-name">${t}</span><span class="type-count">${n}</span></div>`).join(""):`<div style="color:#94A3B8;text-align:center;padding:16px;font-size:13px">لا بيانات</div>`}
  </div></div>`;
}

renderNew();updateBadge();
</script>
</body>
</html>
